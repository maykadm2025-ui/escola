<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema de Busca - Escola General Joaquim Inácio</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    
    <style>
        /* ── RESET E PERFORMANCE CSS ── */
        * { 
            margin: 0;
            padding: 0;
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #000;
            color: #f8fafc;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ── CABEÇALHO FIXO ── */
        .fixed-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid #262626;
            z-index: 1000;
            padding: 8px 0;
        }

        .header-container {
            width: 94%;
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        .escola-titulo {
            text-align: center;
            font-size: 2.0rem;
            font-weight: 800;
            margin-bottom: 6px;
            color: #fff;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-add {
            position: absolute;
            top: 0;
            right: 0;
            width: 50px;
            height: 40px;
            background: #111;
            color: #fff;
            border: 2px solid #262626;
            border-radius: 8px;
            font-weight: bold;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-controls {
            display: none;
            flex-direction: column;
            gap: 6px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px 14px;
            background: #111;
            border: 2px solid #262626;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
        }

        .button-actions-row {
            display: flex;
            gap: 6px;
            width: 100%;
        }

        button {
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 40px;
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.96); }

        .btn-voice { background: #222; color: white; width: 50px; font-size: 16px; }
        .btn-voice.recording { background: #ef4444; animation: pulse 1.5s infinite; }
        
        .btn-main { background: #6366f1; color: white; flex: 1; text-transform: uppercase; }
        .btn-clear { background: #2a0a0a; color: #fca5a5; width: 50px; font-size: 16px; }

        .status-row {
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 55px; 
        }

        .counter-badge { font-size: 10px; font-weight: 600; color: #64748b; }

        .nav-cluster { 
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex; 
            gap: 4px; 
        }
        
        .btn-nav {
            background: #1e1e1e;
            color: white;
            padding: 0 40px;
            height: 55px;
            border-radius: 5px;
            border: 1px solid #333;
        }

        .person-tag {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            padding: 1px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            display: none;
        }

        /* ── CONTEÚDO ── */
        .main-content {
            width: 95%;
            max-width: 900px;
            margin: 180px auto 20px auto;
        }

        .upload-card {
            background: #141414;
            border: 2px dashed #333;
            border-radius: 15px;
            padding: 40px 20px;
            text-align: center;
        }

        #viewer {
            background: #141414;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #262626;
            display: none;
        }

        table { border-collapse: collapse; width: 100%; margin: 15px 0; color: #ccc; }
        td, th { border: 1px solid #333; padding: 8px; font-size: 12px; }
        
        .match { background: #fef08a; color: #000; font-weight: bold; scroll-margin-top: 150px; }
        .match.active { background: #f59e0b; color: #fff; box-shadow: 0 0 10px #f59e0b; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        @media (max-width: 600px) { .main-content { margin-top: 190px; } }
    </style>
</head>
<body>

<header class="fixed-header">
    <div class="header-container">
        <button class="btn-add" onclick="addNewRow()">+</button>
        <div class="escola-titulo">General</div>
        
        <div id="searchContainer" class="search-controls">
            <div class="input-full-row">
                <input type="text" id="searchInput" placeholder="Nome do aluno...">
            </div>

            <div class="button-actions-row">
                <button class="btn-voice" id="voiceBtn">🎤</button>
                <button class="btn-main" onclick="performSearch()">PESQUISAR</button>
                <button class="btn-clear" onclick="clearFile()">🔄</button>
            </div>
            
            <div class="status-row">
                <div id="counterText" class="counter-badge">Pronto.</div>
                <div id="navButtons" class="nav-cluster" style="display: none;">
                    <button class="btn-nav" onclick="navigate(-1)">◀</button>
                    <button class="btn-nav" onclick="navigate(1)">▶</button>
                </div>
                <div id="personBadge" class="person-tag">Aluno: <span id="pName"></span></div>
            </div>
        </div>
    </div>
</header>

<main class="main-content">
    <div id="uploadArea" class="upload-card">
        <h3>📄 Abrir Lista (.docx)</h3>
        <input type="file" id="fileInput" accept=".docx" style="display:none"/>
    </div>
    <div id="viewer"></div>
</main>

<script>
    const SUPABASE_URL = "https://epbfgvhjrcfjewwmptjj.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVwYmZndmhqcmNmamV3d21wdGpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNzk4NjgsImV4cCI6MjA4ODc1NTg2OH0.50JJJgmtSAFCA6ivFyzFW1EiPx2hsxoF5Rl4BvOaiwQ";
    const BUCKET = "documentos";

    let db, docHtml = "", matchesElements = [], currentIdx = -1, isProcessing = false;
    let debounceTimer;

    // Banco Local
    function initDB() {
        return new Promise((res) => {
            const req = indexedDB.open("WordSearchDB", 1);
            req.onsuccess = e => { db = e.target.result; res(); };
            req.onupgradeneeded = e => { e.target.result.createObjectStore("documents"); };
        });
    }

    function saveToDB(data) { db.transaction(["documents"], "readwrite").objectStore("documents").put(data, "currentFile"); }

    function loadFromDB() {
        return new Promise((res) => {
            const req = db.transaction(["documents"], "readonly").objectStore("documents").get("currentFile");
            req.onsuccess = e => res(e.target.result || null);
        });
    }

    function clearFile() {
        if (prompt("Senha:") === "0009") {
            db.transaction(["documents"], "readwrite").objectStore("documents").delete("currentFile");
            localStorage.removeItem("lastFileName");
            sessionStorage.setItem("skipSupabaseFetch", "true"); 
            location.reload();
        }
    }

    function renderHtml(htmlContent) {
        const viewer = document.getElementById("viewer");
        viewer.innerHTML = htmlContent;
        viewer.querySelectorAll('td[contenteditable="true"]').forEach(td => td.addEventListener("input", debounceSave));
    }

    async function processDoc(buf) {
        document.getElementById("uploadArea").style.display = "none";
        document.getElementById("searchContainer").style.display = "flex";
        isProcessing = true;
        try {
            const result = await mammoth.convertToHtml({ arrayBuffer: buf });
            docHtml = result.value;
            saveToDB(docHtml); 
            renderHtml(docHtml);
            document.getElementById("viewer").style.display = "block";
        } finally { isProcessing = false; }
    }

    async function fetchLatestFromSupabase() {
        if (isProcessing) return;
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        try {
            const { data } = await _supabase.storage.from(BUCKET).list('', { limit: 1, sortBy: { column: 'created_at', order: 'desc' } });
            if (data && data[0] && data[0].name !== localStorage.getItem("lastFileName")) {
                const { data: fileData } = await _supabase.storage.from(BUCKET).download(data[0].name);
                if (fileData) {
                    const text = data[0].name.endsWith('.html') ? await fileData.text() : null;
                    if (text) { docHtml = text; renderHtml(text); saveToDB(text); }
                    localStorage.setItem("lastFileName", data[0].name);
                }
            }
        } catch (e) {}
    }

    async function uploadHtmlToSupabase(htmlContent) {
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const fileName = `doc_${Date.now()}.html`;
        try {
            const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
            await _supabase.storage.from(BUCKET).upload(fileName, blob);
            localStorage.setItem("lastFileName", fileName);
        } catch(e) {}
    }

    function debounceSave() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
            const clone = document.getElementById("viewer").cloneNode(true);
            clone.querySelectorAll('.match').forEach(el => {
                const p = el.parentNode;
                while(el.firstChild) p.insertBefore(el.firstChild, el);
                p.removeChild(el);
            });
            docHtml = clone.innerHTML;
            saveToDB(docHtml); 
            uploadHtmlToSupabase(docHtml); 
        }, 1500); 
    }

    document.getElementById("uploadArea").onclick = () => document.getElementById("fileInput").click();
    document.getElementById("fileInput").onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const name = `doc_${Date.now()}.docx`;
        await _supabase.storage.from(BUCKET).upload(name, file);
        localStorage.setItem("lastFileName", name);
        const reader = new FileReader();
        reader.onload = ev => processDoc(ev.target.result);
        reader.readAsArrayBuffer(file);
    };

    function addNewRow() {
        const v = document.getElementById("viewer");
        if (!v.innerHTML) return;
        const nt = document.createElement("table");
        nt.innerHTML = `<tr><td style="width:80%;color:#fff;" contenteditable="true">Novo Nome...</td><td style="width:20%;color:#fff;text-align:center;" contenteditable="true">Info</td></tr>`;
        nt.querySelectorAll('td').forEach(td => td.addEventListener("input", debounceSave));
        v.appendChild(nt);
        debounceSave();
        nt.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function generateSmartRegexStr(query) {
        let q = query.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\./g, "").toLowerCase().trim();
        q = q.replace(/(.)\1+/g, "$1").replace(/^h/, "");
        const mapa = { 'a':'[aáàãâ]','e':'[iyeéê]','i':'[eiíy]','y':'[eyií]','o':'[oóôõ]','u':'[uúüw]','w':'[vwuúü]','c':'[cçcskq]','k':'[ckq]','q':'[qkc]','s':'[sçcz]','z':'[zsç]','ç':'[çscz]','v':'[vw]','g':'[gj]','j':'[jg]' };
        return q.split("").map(c => (mapa[c] || c.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")) + "+").join("h?");
    }

    function performSearch() {
        const query = document.getElementById("searchInput").value;
        const viewer = document.getElementById("viewer");
        const nav = document.getElementById("navButtons");
        const badge = document.getElementById("personBadge");
        const counter = document.getElementById("counterText");

        if (!query.trim()) { renderHtml(docHtml); nav.style.display = "none"; badge.style.display = "none"; counter.innerText = "Pronto."; return; }

        const pattern = generateSmartRegexStr(query);
        const fastRegex = new RegExp(`(h?${pattern})(?![^<]*>)`, "gi"); 
        renderHtml(docHtml.replace(fastRegex, '<span class="match">$1</span>'));

        matchesElements = Array.from(viewer.querySelectorAll(".match"));
        if (matchesElements.length > 0) {
            nav.style.display = "flex";
            counter.innerText = `${matchesElements.length} encontrados.`;
            if (/^[A-ZÀ-Ú]/.test(query.trim())) { badge.style.display = "inline-block"; document.getElementById("pName").innerText = query; }
            currentIdx = -1; navigate(1);
        } else { counter.innerText = "Não encontrado."; nav.style.display = "none"; }
    }

    function navigate(dir) {
        if (!matchesElements.length) return;
        if (currentIdx >= 0) matchesElements[currentIdx].classList.remove("active");
        currentIdx = (currentIdx + dir + matchesElements.length) % matchesElements.length;
        const el = matchesElements[currentIdx];
        el.classList.add("active");
        el.scrollIntoView({ behavior: "smooth", block: "center" });
        document.getElementById("counterText").innerText = `${currentIdx + 1} de ${matchesElements.length}`;
    }

    // VOZ COM LÓGICA DE 5 SEGUNDOS
    const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (Speech) {
        const rec = new Speech();
        rec.lang = "pt-BR";
        rec.continuous = false; // Garante que ele foque em uma frase por vez
        let voiceTimeout;
        const vBtn = document.getElementById("voiceBtn");
        
        vBtn.onclick = () => { 
            try { rec.start(); } catch(e) {}
            vBtn.classList.add("recording"); 
            clearTimeout(voiceTimeout);
            // Mantém ligado por 5 segundos independente de falar ou não
            voiceTimeout = setTimeout(() => {
                try { rec.stop(); } catch(e) {}
                vBtn.classList.remove("recording");
            }, 5000);
        };
        
        rec.onresult = e => {
            const text = e.results[0][0].transcript.replace(/\.$/, "");
            document.getElementById("searchInput").value = text;
            performSearch();
        };
        rec.onend = () => { vBtn.classList.remove("recording"); };
    }

    document.getElementById("searchInput").addEventListener('input', e => { if (!e.target.value) performSearch(); });
    document.getElementById("searchInput").onkeypress = e => { if (e.key === "Enter") performSearch(); };

    window.onload = async () => {
        await initDB();
        const saved = await loadFromDB();
        if (saved) { 
            if (typeof saved === 'string') { docHtml = saved; renderHtml(saved); document.getElementById("viewer").style.display = "block"; document.getElementById("uploadArea").style.display = "none"; document.getElementById("searchContainer").style.display = "flex"; }
            else processDoc(saved);
        } 
        if (!sessionStorage.getItem("skipSupabaseFetch")) fetchLatestFromSupabase();
        setInterval(fetchLatestFromSupabase, 10000);
    };
</script>
</body>
</html>
