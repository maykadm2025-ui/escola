<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema de Busca - Escola General Joaquim Inácio</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    
    <style>
    
        /* ── RESET TOTAL ── */
        * { 
            margin: 0;
            padding: 0;
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #000;
            color: #f8fafc;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ── CABEÇALHO COLADO NO TOPO ── */
        .fixed-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid #262626;
            z-index: 1000;
            padding: 8px 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }

        .header-container {
            width: 94%;
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        .escola-titulo {
            text-align: center;
            font-size: 2.0rem;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 6px;
            color: #fff;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Botão + Adicionar Linha */
        .btn-add {
            position: absolute;
            top: 0;
            right: 0;
            width: 50px;
            height: 40px;
            background: #111;
            color: #fff;
            border: 2px solid #262626;
            border-radius: 8px;
            font-weight: bold;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
        }
        .btn-add:active { transform: scale(0.96); }

        /* Controles de Busca */
        .search-controls {
            display: none;
            flex-direction: column;
            gap: 6px;
        }

        .input-full-row { width: 100%; }

        input[type="text"] {
            width: 100%;
            padding: 10px 14px;
            background: #111;
            border: 2px solid #262626;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #6366f1;
        }

        .button-actions-row {
            display: flex;
            gap: 6px;
            width: 100%;
        }

        button {
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            height: 40px;
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.96); }

        .btn-voice { background: #222; color: white; width: 50px; font-size: 16px; }
        .btn-voice.recording { background: #ef4444; animation: pulse 1.5s infinite; }
        
        .btn-main { background: #6366f1; color: white; flex: 1; text-transform: uppercase; }
        .btn-clear { background: #2a0a0a; color: #fca5a5; width: 50px; font-size: 16px; }

        /* Status e Navegação */
        .status-row {
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2px;
            min-height: 55px; 
        }

        .counter-badge { font-size: 10px; font-weight: 600; color: #64748b; }

        .nav-cluster { 
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex; 
            gap: 4px; 
            z-index: 10;
        }
        
        .btn-nav {
            background: #1e1e1e;
            color: white;
            padding: 0 40px;
            height: 55px;
            border-radius: 5px;
            font-size: 10px;
            border: 1px solid #333;
        }

        .person-tag {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            padding: 1px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            border: 1px solid rgba(16, 185, 129, 0.2);
            display: none;
        }

        #systemLog { display: none !important; }

        /* ── CONTEÚDO PRINCIPAL ── */
        .main-content {
            width: 95%;
            max-width: 900px;
            margin: 220px auto 10px auto;
            padding-bottom: 30px;
        }

        .upload-card {
            background: #141414;
            border: 2px dashed #333;
            border-radius: 15px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
        }

        #viewer {
            background: #141414;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #262626;
            display: none; 
            cursor: pointer;
        }

        /* Estilo das tabelas Word e Tabela Customizada */
        table { border-collapse: collapse; width: 100%; margin: 15px 0; color: #ccc; }
        td, th { border: 1px solid #333; padding: 8px; font-size: 12px; }
        
        .match { 
            background: #fef08a; 
            color: #000; 
            font-weight: bold; 
            scroll-margin-top: 150px; 
        }
        .match.active { 
            background: #f59e0b; 
            color: #fff; 
            box-shadow: 0 0 10px #f59e0b;
        }

        /* ── AÇÕES DE LINHA CUSTOMIZADA (DESKTOP/MOBILE) ── */
        .desktop-actions {
            display: table-cell;
            width: 150px;
            text-align: center;
            vertical-align: middle;
            white-space: nowrap;
        }
        .action-btn {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 10px;
            margin: 2px;
            font-weight: 800;
            display: inline-block;
        }
        .btn-edit { background: #eab308; color: #000; border-color: #ca8a04; }
        .btn-delete { background: #ef4444; color: #fff; border-color: #b91c1c; }
        .btn-save-row { background: #10b981; color: #fff; border-color: #059669; }

        /* ── MODAL DE STATUS ── */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }
        .modal-box {
            background: #141414;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 25px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-title {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: #fff;
            text-align: center;
            font-weight: bold;
        }
        .modal-name {
            font-size: 1rem;
            color: #a5b4fc;
            margin-bottom: 10px;
            text-align: center;
            word-break: break-word;
            padding: 10px;
            background: #111;
            border-radius: 8px;
            border: 1px solid #262626;
        }
        
        .history-list {
            background: #0a0a0a;
            border: 1px solid #262626;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
            max-height: 120px;
            overflow-y: auto;
            font-size: 11px;
            color: #94a3b8;
        }
        .history-item {
            border-bottom: 1px solid #1f1f1f;
            padding: 5px 0;
        }
        .history-item:last-child {
            border-bottom: none;
        }

        .modal-option {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #333;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
        .modal-option input[type="checkbox"] {
            width: 22px;
            height: 22px;
            accent-color: #10b981;
        }
        .modal-actions {
            display: flex;
            gap: 8px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .btn-modal {
            flex: 1;
            min-width: 30%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
        }
        .btn-cancel-modal { background: #333; color: #fff; }
        .btn-remove-modal { background: #ef4444; color: #fff; }
        .btn-save-modal { background: #10b981; color: #fff; }

        .status-badge {
            color: #10b981;
            font-weight: 800;
            font-size: 11px;
            margin-left: 8px;
            background: rgba(16, 185, 129, 0.15);
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid rgba(16, 185, 129, 0.3);
            display: inline-block; 
            vertical-align: middle;
            white-space: nowrap;
        }

        #mobileLoading {
            display: none;
        }

        @media (max-width: 600px) {
            .main-content { margin-top: 190px; }
            
            #viewer.search-active > :not(.has-match) {
                display: none !important;
            }

            #viewer.search-active > .has-match {
                display: block !important; 
                width: 100%; 
                margin: 10px 0;
            }

            #viewer.search-active > table.has-match {
                display: table !important;
            }

            #viewer.search-active table.has-match tr:not(:first-child):not(.has-match) {
                display: none !important;
            }
            
            /* Oculta completamente botões de edição/exclusão no Mobile */
            .desktop-actions {
                display: none !important;
            }

            #mobileLoading.active {
                display: flex;
                position: fixed;
                top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0,0,0,0.92);
                z-index: 9999;
                align-items: center;
                justify-content: center;
                flex-direction: column;
                gap: 15px;
                color: #fff;
                font-weight: bold;
                letter-spacing: 2px;
                text-align: center;
                padding: 20px;
            }
            .spinner {
                width: 40px; height: 40px;
                border: 4px solid #333;
                border-top: 4px solid #6366f1;
                border-radius: 50%;
                animation: spin 1s linear infinite;
            }
            @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="statusModalOverlay" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-title">Status do Documento</div>
        <div id="modalStudentName" class="modal-name"></div>
        
        <div id="statusHistoryList" class="history-list"></div>

        <label class="modal-option">
            <input type="checkbox" id="chkHistorico">
            HISTÓRICO PRONTO
        </label>
        <label class="modal-option">
            <input type="checkbox" id="chkDeclaracao">
            DECLARAÇÃO PRONTA
        </label>

        <div class="modal-actions">
            <button class="btn-modal btn-cancel-modal" onclick="closeStatusModal()">FECHAR</button>
            <button class="btn-modal btn-remove-modal" onclick="removeDocumentStatus()">REMOVER</button>
            <button class="btn-modal btn-save-modal" onclick="saveDocumentStatus()">SALVAR</button>
        </div>
    </div>
</div>

<div id="mobileLoading">
    <div class="spinner"></div>
    <div>CARREGANDO AGUARDE</div>
</div>

<header class="fixed-header">
    <div class="header-container">
        <button class="btn-add" onclick="addNewRow()">+</button>
        <div class="escola-titulo">General</div>
        
        <div id="searchContainer" class="search-controls">
            <div class="input-full-row">
                <input type="text" id="searchInput" placeholder="Nome do aluno...">
            </div>

            <div class="button-actions-row">
                <button class="btn-voice" id="voiceBtn">🎤</button>
                <button class="btn-main" onclick="performSearch()">PESQUISAR</button>
                <button class="btn-clear" onclick="clearFile()">🔄</button>
            </div>
            
            <div class="status-row">
                <div id="counterText" class="counter-badge">Pronto.</div>
                
                <div id="navButtons" class="nav-cluster" style="display: none;">
                    <button class="btn-nav" onclick="navigate(-1)">◀</button>
                    <button class="btn-nav" onclick="navigate(1)">▶</button>
                </div>

                <div id="personBadge" class="person-tag">Aluno: <span id="pName"></span></div>
            </div>
            
            <div id="systemLog"></div>
        </div>
    </div>
</header>

<main class="main-content">
    <div id="uploadArea" class="upload-card">
        <h3>📄 Abrir Lista (.docx)</h3>
        <p>Clique para selecionar o arquivo</p>
        <input type="file" id="fileInput" accept=".docx" style="display:none"/>
    </div>

    <div id="viewer"></div>
</main>

<script>
    // Credenciais injetadas pelo Flask
    const SUPABASE_URL = "{{ supabase_url }}";
    const SUPABASE_KEY = "{{ supabase_key }}";
    const PASSWORD = "{{ password }}";

    const BUCKET = "documentos";
    // ── CORREÇÃO: nome fixo para o arquivo de sincronização ──
    const SYNC_FILE_NAME = "sync_doc.html";

    let db, docHtml = "", matchesElements = [], currentIdx = -1, isProcessing = false;
    let debounceTimer; 
    let activeElementForStatus = null;

    function setMobileLoading(isLoading) {
        const loader = document.getElementById("mobileLoading");
        if (isLoading) {
            loader.classList.add("active");
        } else {
            loader.classList.remove("active");
        }
    }

    function initDB() {
        return new Promise((res) => {
            const req = indexedDB.open("WordSearchDB", 1);
            req.onsuccess = e => { db = e.target.result; res(); };
            req.onupgradeneeded = e => { e.target.result.createObjectStore("documents"); };
        });
    }

    function saveToDB(data) {
        db.transaction(["documents"], "readwrite").objectStore("documents").put(data, "currentFile");
    }

    function loadFromDB() {
        return new Promise((res) => {
            const req = db.transaction(["documents"], "readonly").objectStore("documents").get("currentFile");
            req.onsuccess = e => res(e.target.result || null);
        });
    }

    function clearFile() {
        const senha = prompt("Digite a senha para trocar o arquivo:");
        if (senha === PASSWORD) {
            db.transaction(["documents"], "readwrite").objectStore("documents").delete("currentFile");
            localStorage.removeItem("lastSyncKey");
            sessionStorage.setItem("skipSupabaseFetch", "true"); 
            location.reload();
        } else if (senha !== null) {
            alert("Senha incorreta!");
        }
    }

    async function processDoc(buf) {
        document.getElementById("uploadArea").style.display = "none";
        document.getElementById("searchContainer").style.display = "flex";
        isProcessing = true;
        setMobileLoading(true);

        try {
            const result = await mammoth.convertToHtml({ arrayBuffer: buf });
            docHtml = result.value;
            
            const v = document.getElementById("viewer");
            v.innerHTML = docHtml;
            ensureActionButtons(); 
            v.style.display = "none"; 
        } catch (err) {
            console.error(err);
            document.getElementById("uploadArea").style.display = "block";
            document.getElementById("searchContainer").style.display = "none";
        } finally {
            isProcessing = false;
            setMobileLoading(false);
        }
    }

    function displayCachedHtml(htmlData) {
        docHtml = htmlData;
        document.getElementById("uploadArea").style.display = "none";
        document.getElementById("searchContainer").style.display = "flex";
        
        const v = document.getElementById("viewer");
        v.innerHTML = docHtml;
        ensureActionButtons(); 
        v.style.display = "none"; 
    }

    function ensureActionButtons() {
        const viewer = document.getElementById("viewer");
        let modified = false;

        viewer.querySelectorAll("table").forEach(table => {
            if (table.style.marginTop === "15px" || table.querySelector('.custom-row')) {
                table.querySelectorAll("tr").forEach(tr => {
                    tr.classList.add('custom-row');
                });
            }
        });

        viewer.querySelectorAll("tr").forEach(tr => {
            const hasActions = tr.querySelector('.desktop-actions');
            
            if (tr.classList.contains('custom-row')) {
                if (!hasActions) {
                    const td = document.createElement('td');
                    td.className = 'desktop-actions';
                    td.style.border = "1px solid #333";
                    td.style.padding = "8px";
                    td.contentEditable = "false";
                    td.innerHTML = `
                        <button class="action-btn btn-edit" onclick="toggleEditRow(this)">EDITAR</button>
                        <button class="action-btn btn-save-row" style="display:none;" onclick="toggleEditRow(this)">SALVAR</button>
                        <button class="action-btn btn-delete" onclick="deleteCustomRow(this)">EXCLUIR</button>
                    `;
                    tr.appendChild(td);
                    modified = true;
                }
            } else {
                if (hasActions) {
                    hasActions.remove();
                    modified = true;
                }
            }
        });

        if (modified) {
            docHtml = viewer.innerHTML;
            saveToDB(docHtml);
        }
    }

    async function fetchLatestFromSupabase() {
        if (isProcessing) return;
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        try {
            // Usa list() para obter metadados (size + updated_at) sem baixar o arquivo
            const { data: listData, error: listError } = await _supabase.storage
                .from(BUCKET)
                .list('', { search: SYNC_FILE_NAME });

            if (listError || !listData || listData.length === 0) return;

            const fileInfo = listData.find(f => f.name === SYNC_FILE_NAME);
            if (!fileInfo) return;

            // Chave de comparação: updated_at do servidor (sempre preenchido)
            const serverKey = fileInfo.updated_at || fileInfo.created_at || "";
            const localKey  = localStorage.getItem("lastSyncKey");

            if (serverKey && serverKey === localKey) return; // nada mudou, não baixa

            // Mudou: baixa o conteúdo
            const { data: fileData, error: downloadError } = await _supabase.storage
                .from(BUCKET)
                .download(SYNC_FILE_NAME);

            if (downloadError || !fileData) return;

            const text = await fileData.text();
            localStorage.setItem("lastSyncKey", serverKey);
            displayCachedHtml(text);
            saveToDB(text);

            if (document.getElementById("searchInput").value.trim() !== "") {
                performSearch();
            }
        } catch (err) {
            console.error("Erro ao buscar arquivo do Supabase:", err);
        } finally {
            isProcessing = false;
            setMobileLoading(false);
        }
    }

    document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === 'visible') {
            fetchLatestFromSupabase();
        }
    });

    async function uploadHtmlToSupabase(htmlContent) {
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const counter = document.getElementById("counterText");
        
        counter.innerText = "Salvando na nuvem...";

        try {
            const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
            // ── CORREÇÃO: sempre sobrescreve o mesmo arquivo com upsert: true ──
            await _supabase.storage.from(BUCKET).upload(SYNC_FILE_NAME, blob, { upsert: true });

            // Após upload, busca os metadados para gravar a chave correta
            const { data: listData } = await _supabase.storage
                .from(BUCKET).list('', { search: SYNC_FILE_NAME });
            const fileInfo = listData && listData.find(f => f.name === SYNC_FILE_NAME);
            if (fileInfo) {
                const serverKey = fileInfo.updated_at || fileInfo.created_at || "";
                if (serverKey) localStorage.setItem("lastSyncKey", serverKey);
            }
            
            counter.innerText = "Sincronizado!";
            setTimeout(() => { if(counter.innerText === "Sincronizado!") counter.innerText = "Pronto."; }, 3000);
        } catch(ex) {
            console.error("Erro no upload de atualização:", ex);
            counter.innerText = "Erro ao salvar na nuvem.";
        }
    }

    function debounceSave() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
            const viewer = document.getElementById("viewer");
            const clone = viewer.cloneNode(true);
            
            clone.classList.remove("search-active");
            clone.querySelectorAll('.has-match').forEach(el => el.classList.remove('has-match'));
            
            clone.querySelectorAll('.editing-mode').forEach(tr => {
                tr.classList.remove('editing-mode');
                Array.from(tr.querySelectorAll('td')).filter(td => !td.classList.contains('desktop-actions')).forEach(c => {
                    c.contentEditable = "false";
                    c.style.backgroundColor = "";
                    c.style.outline = "none";
                });
                const btnEdit = tr.querySelector('.btn-edit');
                const btnSave = tr.querySelector('.btn-save-row');
                if(btnEdit) btnEdit.style.display = "inline-block";
                if(btnSave) btnSave.style.display = "none";
            });

            const matches = clone.querySelectorAll('.match');
            matches.forEach(el => {
                const parent = el.parentNode;
                while(el.firstChild) parent.insertBefore(el.firstChild, el);
                parent.removeChild(el);
            });
            
            docHtml = clone.innerHTML;
            saveToDB(docHtml); 
            uploadHtmlToSupabase(docHtml); 
        }, 1500); 
    }

    const fileInput = document.getElementById("fileInput");
    document.getElementById("uploadArea").onclick = () => fileInput.click();

    fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async (ev) => {
            await processDoc(ev.target.result);
            // ── CORREÇÃO: após processar o docx, sobe o HTML gerado com nome fixo ──
            uploadHtmlToSupabase(docHtml);
        };
        reader.readAsArrayBuffer(file);
    };

    // ── ADICIONAR LINHA E FUNÇÕES DE EDIÇÃO/EXCLUSÃO ── //
    function addNewRow() {
        const viewer = document.getElementById("viewer");
        if (!docHtml) {
            alert("Abra ou espere carregar uma lista primeiro.");
            return;
        }

        viewer.style.display = "block"; 
        viewer.classList.add("search-active");

        const newTable = document.createElement("table");
        newTable.style.width = "100%";
        newTable.style.marginTop = "15px";
        newTable.classList.add("has-match"); 
        
        newTable.innerHTML = `
            <tr class="has-match custom-row editing-mode">
                <td style="width: 60%; border: 1px solid #333; padding: 8px; color: #fff; background-color: #262626; outline: 1px solid #eab308;" contenteditable="true">Inserir Nome...</td>
                <td style="width: 20%; border: 1px solid #333; padding: 8px; color: #fff; text-align: center; background-color: #262626; outline: 1px solid #eab308;" contenteditable="true">Info...</td>
                <td class="desktop-actions" style="width: 20%; border: 1px solid #333; padding: 8px; text-align: center;" contenteditable="false">
                    <button class="action-btn btn-edit" style="display:none;" onclick="toggleEditRow(this)">EDITAR</button>
                    <button class="action-btn btn-save-row" style="display:inline-block;" onclick="toggleEditRow(this)">SALVAR</button>
                    <button class="action-btn btn-delete" onclick="deleteCustomRow(this)">EXCLUIR</button>
                </td>
            </tr>
        `;

        viewer.insertBefore(newTable, viewer.firstChild);
        debounceSave();
        newTable.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function toggleEditRow(btn) {
        const tr = btn.closest('tr');
        const cells = Array.from(tr.querySelectorAll('td')).filter(td => !td.classList.contains('desktop-actions'));
        const isEditing = tr.classList.contains('editing-mode');
        
        const saveBtn = tr.querySelector('.btn-save-row');
        const editBtn = tr.querySelector('.btn-edit');

        if (!isEditing) {
            cells.forEach(c => {
                c.contentEditable = "true";
                c.style.backgroundColor = "#262626";
                c.style.outline = "1px solid #eab308";
            });
            tr.classList.add('editing-mode');
            if(editBtn) editBtn.style.display = "none";
            if(saveBtn) saveBtn.style.display = "inline-block";
        } else {
            cells.forEach(c => {
                c.contentEditable = "false";
                c.style.backgroundColor = "";
                c.style.outline = "none";
            });
            tr.classList.remove('editing-mode');
            if(saveBtn) saveBtn.style.display = "none";
            if(editBtn) editBtn.style.display = "inline-block";
            debounceSave();
        }
    }

    function deleteCustomRow(btn) {
        if(confirm("Deseja realmente excluir este registro?")) {
            const tr = btn.closest('tr');
            const table = tr.closest('table');
            tr.remove();
            if(table && table.querySelectorAll('tr').length === 0) {
                table.remove();
            }
            debounceSave();
        }
    }

    function logToHistory(target, message) {
        let history = [];
        const existing = target.getAttribute('data-history');
        if (existing) {
            try { history = JSON.parse(existing); } catch(e) {}
        }
        const dateStr = new Date().toLocaleString('pt-BR');
        history.push(`[${dateStr}] ${message}`);
        target.setAttribute('data-history', JSON.stringify(history));
    }

    document.getElementById("viewer").addEventListener("click", function(e) {
        const target = e.target.closest("td, p, li");
        
        if (!target || e.target.tagName === 'BUTTON' || target.contentEditable === "true" || target.classList.contains('desktop-actions')) return;

        const text = target.textContent.trim();
        if (text === "Inserir Nome..." || text === "Info...") return;

        activeElementForStatus = target;
        
        let clone = target.cloneNode(true);
        clone.querySelectorAll('.status-badge').forEach(b => b.remove());
        clone.querySelectorAll('.desktop-actions').forEach(b => b.remove()); 
        clone.querySelectorAll('.match').forEach(b => {
            const parent = b.parentNode;
            while(b.firstChild) parent.insertBefore(b.firstChild, b);
            parent.removeChild(b);
        });
        
        const cleanName = clone.textContent.trim();
        if (!cleanName) return;

        document.getElementById("modalStudentName").innerText = cleanName;

        let hasHist = false, hasDecl = false;
        target.querySelectorAll('.status-badge').forEach(b => {
            if (b.innerText.includes('HISTÓRICO PRONTO')) hasHist = true;
            if (b.innerText.includes('DECLARAÇÃO PRONTA')) hasDecl = true;
        });

        document.getElementById("chkHistorico").checked = hasHist;
        document.getElementById("chkDeclaracao").checked = hasDecl;

        const historyData = target.getAttribute('data-history');
        const historyList = document.getElementById("statusHistoryList");
        historyList.innerHTML = ''; 
        
        if (historyData) {
            try {
                const logs = JSON.parse(historyData);
                logs.forEach(log => {
                    const div = document.createElement('div');
                    div.className = 'history-item';
                    div.innerText = log;
                    historyList.appendChild(div);
                });
            } catch(e) {}
        } else {
            historyList.innerHTML = '<div class="history-item">Nenhum histórico registrado ainda.</div>';
        }

        document.getElementById("statusModalOverlay").style.display = "flex";
    });

    function closeStatusModal() {
        document.getElementById("statusModalOverlay").style.display = "none";
        activeElementForStatus = null;
    }

    function saveDocumentStatus() {
        if (!activeElementForStatus) return;

        const hist = document.getElementById("chkHistorico").checked;
        const decl = document.getElementById("chkDeclaracao").checked;

        let oldHist = false, oldDecl = false;
        activeElementForStatus.querySelectorAll('.status-badge').forEach(b => {
            if (b.innerText.includes('HISTÓRICO PRONTO')) oldHist = true;
            if (b.innerText.includes('DECLARAÇÃO PRONTA')) oldDecl = true;
        });

        if (hist && !oldHist) logToHistory(activeElementForStatus, 'Marcado como HISTÓRICO PRONTO');
        if (decl && !oldDecl) logToHistory(activeElementForStatus, 'Marcado como DECLARAÇÃO PRONTA');
        if (!hist && oldHist) logToHistory(activeElementForStatus, 'Desmarcado HISTÓRICO PRONTO');
        if (!decl && oldDecl) logToHistory(activeElementForStatus, 'Desmarcado DECLARAÇÃO PRONTA');

        activeElementForStatus.querySelectorAll('.status-badge').forEach(b => b.remove());

        if (hist || decl) {
            const badge = document.createElement("span");
            badge.className = "status-badge";
            badge.contentEditable = "false"; 
            
            let labels = [];
            const dataHoje = new Date().toLocaleDateString('pt-BR');
            
            if (hist) labels.push(`HISTÓRICO PRONTO (${dataHoje})`);
            if (decl) labels.push(`DECLARAÇÃO PRONTA (${dataHoje})`);
            
            badge.innerText = labels.join(" | ");
            activeElementForStatus.appendChild(badge);
        }

        closeStatusModal();
        debounceSave(); 
    }

    function removeDocumentStatus() {
        if (!activeElementForStatus) return;

        let teveRemocao = false;
        activeElementForStatus.querySelectorAll('.status-badge').forEach(b => {
            b.remove();
            teveRemocao = true;
        });

        if (teveRemocao) {
            logToHistory(activeElementForStatus, 'Status removido da exibição principal');
        }

        closeStatusModal();
        debounceSave();
    }

    function generateSmartRegex(query) {
        let q = query.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\./g, "").toLowerCase().trim();
        q = q.replace(/(.)\1+/g, "$1").replace(/^h/, "");
        const mapa = {
            'a':'[aáàãâ]','e':'[iyeéê]','i':'[eiíy]','y':'[eyií]',
            'o':'[oóôõ]', 'u':'[uúüw]','w':'[vwuúü]',
            'c': '[cçcskq]', 'k':'[ckq]', 'q':'[qkc]',
            's':'[sçcz]', 'z':'[zsç]', 'ç':'[çscz]', 'v':'[vw]', 'g':'[gj]', 'j':'[jg]' 
        };
        const pattern = q.split("").map(c => (mapa[c] || c.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")) + "+").join("h?");
        return new RegExp(`(h?${pattern})`, "gi");
    }

    function performSearch() {
        if (isProcessing) return;
        const query = document.getElementById("searchInput").value;
        const viewer = document.getElementById("viewer");
        const nav = document.getElementById("navButtons");
        const badge = document.getElementById("personBadge");
        const counter = document.getElementById("counterText");

        viewer.innerHTML = docHtml;
        viewer.classList.remove("search-active");
        
        matchesElements = []; 
        currentIdx = -1;
        badge.style.display = "none";
        nav.style.display = "none";

        if (!query.trim()) {
            counter.innerText = "Pronto.";
            viewer.style.display = "none"; 
            return;
        }

        const regex = generateSmartRegex(query);
        const walker = document.createTreeWalker(viewer, NodeFilter.SHOW_TEXT, null, false);
        const nodes = []; 
        let n;
        while (n = walker.nextNode()) nodes.push(n);

        nodes.forEach(node => {
            if (node.parentNode && node.parentNode.classList && node.parentNode.classList.contains('status-badge')) return;

            if (node.nodeValue.match(regex)) {
                const span = document.createElement("span");
                span.innerHTML = node.nodeValue.replace(regex, '<span class="match">$1</span>');
                node.parentNode.replaceChild(span, node);
            }
        });

        const allMatches = Array.from(viewer.querySelectorAll(".match"));
        const exactQuery = query.trim().toLowerCase();
        
        const exactMatches = [];
        const phoneticMatches = [];
        
        allMatches.forEach(el => {
            if (el.textContent.toLowerCase().includes(exactQuery)) {
                exactMatches.push(el);
            } else {
                phoneticMatches.push(el);
            }
        });

        matchesElements = [...exactMatches, ...phoneticMatches];
        
        const editables = viewer.querySelectorAll('td[contenteditable="true"]');
        editables.forEach(td => td.addEventListener("input", debounceSave));
        
        if (matchesElements.length > 0) {
            viewer.style.display = "block"; 
            viewer.classList.add("search-active");
            
            matchesElements.forEach(el => {
                let tr = el.closest('tr');
                let table = el.closest('table');
                
                if (tr) tr.classList.add('has-match');
                if (table) table.classList.add('has-match');
                
                let current = el;
                while (current && current.parentElement && current.parentElement.id !== 'viewer') {
                    current = current.parentElement;
                }
                if (current && current.parentElement && current.parentElement.id === 'viewer') {
                    current.classList.add('has-match');
                }
            });

            nav.style.display = "flex";
            counter.innerText = `${matchesElements.length} itens encontrados.`;
            if (/^[A-ZÀ-Ú]/.test(query.trim())) {
                badge.style.display = "inline-block";
                document.getElementById("pName").innerText = query;
            }
            navigate(1);
        } else {
            counter.innerText = "Não encontrado.";
            viewer.style.display = "none"; 
        }
    }

    function navigate(dir) {
        if (!matchesElements.length) return;
        if (currentIdx >= 0) matchesElements[currentIdx].classList.remove("active");
        currentIdx += dir;
        if (currentIdx >= matchesElements.length) currentIdx = 0;
        if (currentIdx < 0) currentIdx = matchesElements.length - 1;
        const el = matchesElements[currentIdx];
        el.classList.add("active");
        el.scrollIntoView({ behavior: "smooth", block: "center" });
        document.getElementById("counterText").innerText = `${currentIdx + 1} de ${matchesElements.length}`;
    }

    const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (Speech) {
        const rec = new Speech();
        rec.lang = "pt-BR";
        let voiceTimeout;
        const vBtn = document.getElementById("voiceBtn");
        
        vBtn.onclick = () => { 
            try { rec.start(); } catch(e) {}
            vBtn.classList.add("recording"); 
            
            clearTimeout(voiceTimeout);
            voiceTimeout = setTimeout(() => {
                try { rec.stop(); } catch(e) {}
                vBtn.classList.remove("recording");
            }, 5000);
        };
        
        rec.onresult = e => {
            document.getElementById("searchInput").value = e.results[0][0].transcript.replace(/\.$/, "");
            performSearch();
        };
        
        rec.onend = () => {
            vBtn.classList.remove("recording");
            clearTimeout(voiceTimeout);
        };
    }

    window.onload = async () => {
        await initDB();
        const savedData = await loadFromDB();
        
        if (savedData) {
            if (typeof savedData === 'string') {
                displayCachedHtml(savedData);
            } else {
                processDoc(savedData);
            }
        } 
        
        if (!sessionStorage.getItem("skipSupabaseFetch")) {
            fetchLatestFromSupabase();
        }

        setInterval(() => {
            fetchLatestFromSupabase();
        }, 10000);
    };

    document.getElementById("searchInput").onkeypress = e => { if (e.key === "Enter") performSearch(); };
</script>
