<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema de Busca - Escola General Joaquim Inácio</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    
    <style>
        /* ── RESET TOTAL ── */
        * { 
            margin: 0;
            padding: 0;
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #000;
            color: #f8fafc;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ── CABEÇALHO COLADO NO TOPO ── */
        .fixed-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid #262626;
            z-index: 1000;
            padding: 8px 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }

        .header-container {
            width: 94%;
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        .escola-titulo {
            text-align: center;
            font-size: 2.0rem;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 6px;
            color: #fff;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Botão + Adicionar Linha */
        .btn-add {
            position: absolute;
            top: 0;
            right: 0;
            width: 50px;
            height: 40px;
            background: #111;
            color: #fff;
            border: 2px solid #262626;
            border-radius: 8px;
            font-weight: bold;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
        }
        .btn-add:active { transform: scale(0.96); }

        /* Controles de Busca */
        .search-controls {
            display: none;
            flex-direction: column;
            gap: 6px;
        }

        .input-full-row { width: 100%; }

        input[type="text"] {
            width: 100%;
            padding: 10px 14px;
            background: #111;
            border: 2px solid #262626;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #6366f1;
        }

        .button-actions-row {
            display: flex;
            gap: 6px;
            width: 100%;
        }

        button {
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            height: 40px;
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.96); }

        .btn-voice { background: #222; color: white; width: 50px; font-size: 16px; }
        .btn-voice.recording { background: #ef4444; animation: pulse 1.5s infinite; }
        
        .btn-main { background: #6366f1; color: white; flex: 1; text-transform: uppercase; }
        .btn-clear { background: #2a0a0a; color: #fca5a5; width: 50px; font-size: 16px; }

        /* Status e Navegação */
        .status-row {
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2px;
            min-height: 55px; 
        }

        .counter-badge { font-size: 10px; font-weight: 600; color: #64748b; }

        .nav-cluster { 
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex; 
            gap: 4px; 
            z-index: 10;
        }
        
        .btn-nav {
            background: #1e1e1e;
            color: white;
            padding: 0 40px;
            height: 55px;
            border-radius: 5px;
            font-size: 10px;
            border: 1px solid #333;
        }

        .person-tag {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            padding: 1px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            border: 1px solid rgba(16, 185, 129, 0.2);
            display: none;
        }

        #systemLog { display: none !important; }

        /* ── CONTEÚDO PRINCIPAL ── */
        .main-content {
            width: 95%;
            max-width: 900px;
            margin: 180px auto 20px auto;
            padding-bottom: 30px;
        }

        .upload-card {
            background: #141414;
            border: 2px dashed #333;
            border-radius: 15px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
        }

        /* Removido o content-visibility para acabar com o travamento no mobile */
        #viewer {
            background: #141414;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #262626;
            display: none;
        }

        /* [NOVO] Painel de resultados mobile — mesmo visual do viewer */
        #mobileResults {
            display: none;
            background: #141414;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #262626;
        }

        /* [NOVO] Destaque da linha ativa no mobile */
        #mobileResults table.active-item {
            outline: 2px solid #f59e0b;
            box-shadow: 0 0 10px rgba(245,158,11,0.4);
        }

        /* Estilo das tabelas Word e Tabela Customizada */
        table { border-collapse: collapse; width: 100%; margin: 15px 0; color: #ccc; }
        td, th { border: 1px solid #333; padding: 8px; font-size: 12px; }
        
        .match { 
            background: #fef08a; 
            color: #000; 
            font-weight: bold; 
            scroll-margin-top: 150px; 
        }
        .match.active { 
            background: #f59e0b; 
            color: #fff; 
            box-shadow: 0 0 10px #f59e0b;
        }

        @media (max-width: 600px) {
            .main-content { margin-top: 190px; }
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<header class="fixed-header">
    <div class="header-container">
        <button class="btn-add" onclick="addNewRow()">+</button>
        <div class="escola-titulo">General</div>
        
        <div id="searchContainer" class="search-controls">
            <div class="input-full-row">
                <input type="text" id="searchInput" placeholder="Nome do aluno...">
            </div>

            <div class="button-actions-row">
                <button class="btn-voice" id="voiceBtn">🎤</button>
                <button class="btn-main" onclick="performSearch()">PESQUISAR</button>
                <button class="btn-clear" onclick="clearFile()">🔄</button>
            </div>
            
            <div class="status-row">
                <div id="counterText" class="counter-badge">Pronto.</div>
                
                <div id="navButtons" class="nav-cluster" style="display: none;">
                    <button class="btn-nav" onclick="navigate(-1)">◀</button>
                    <button class="btn-nav" onclick="navigate(1)">▶</button>
                </div>

                <div id="personBadge" class="person-tag">Aluno: <span id="pName"></span></div>
            </div>
            
            <div id="systemLog"></div>
        </div>
    </div>
</header>

<main class="main-content">
    <div id="uploadArea" class="upload-card">
        <h3>📄 Abrir Lista (.docx)</h3>
        <p>Clique para selecionar o arquivo</p>
        <input type="file" id="fileInput" accept=".docx" style="display:none"/>
    </div>

    <div id="viewer"></div>
    <div id="mobileResults"></div>
</main>

<script>
    const SUPABASE_URL = "https://epbfgvhjrcfjewwmptjj.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVwYmZndmhqcmNmamV3d21wdGpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNzk4NjgsImV4cCI6MjA4ODc1NTg2OH0.50JJJgmtSAFCA6ivFyzFW1EiPx2hsxoF5Rl4BvOaiwQ";
    const BUCKET = "documentos";

    let db, docHtml = "", matchesElements = [], currentIdx = -1, isProcessing = false;
    let debounceTimer;

    // [NOVO] Detecta mobile
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 600;

    // Inicialização do Banco Local
    function initDB() {
        return new Promise((res) => {
            const req = indexedDB.open("WordSearchDB", 1);
            req.onsuccess = e => { db = e.target.result; res(); };
            req.onupgradeneeded = e => { e.target.result.createObjectStore("documents"); };
        });
    }

    function saveToDB(data) {
        db.transaction(["documents"], "readwrite").objectStore("documents").put(data, "currentFile");
    }

    function loadFromDB() {
        return new Promise((res) => {
            const req = db.transaction(["documents"], "readonly").objectStore("documents").get("currentFile");
            req.onsuccess = e => res(e.target.result || null);
        });
    }

    function clearFile() {
        const senha = prompt("Digite a senha para trocar o arquivo:");
        if (senha === "0009") {
            db.transaction(["documents"], "readwrite").objectStore("documents").delete("currentFile");
            localStorage.removeItem("lastFileName");
            sessionStorage.setItem("skipSupabaseFetch", "true"); 
            location.reload();
        } else if (senha !== null) {
            alert("Senha incorreta!");
        }
    }

    // Processamento Mammoth (Word Original)
    async function processDoc(buf) {
        document.getElementById("uploadArea").style.display = "none";
        document.getElementById("searchContainer").style.display = "flex";
        isProcessing = true;

        try {
            const result = await mammoth.convertToHtml({ arrayBuffer: buf });
            docHtml = result.value;
            
            saveToDB(docHtml); 

            const v = document.getElementById("viewer");
            v.innerHTML = docHtml;
            v.style.display = "block";
            // [NOVO] Garante que mobileResults suma ao carregar/sincronizar
            const mr = document.getElementById("mobileResults");
            mr.style.display = "none";
            mr.innerHTML = "";
        } catch (err) {
            console.error(err);
            document.getElementById("uploadArea").style.display = "block";
            document.getElementById("searchContainer").style.display = "none";
        } finally {
            isProcessing = false;
        }
    }

    function displayCachedHtml(htmlData) {
        docHtml = htmlData;
        document.getElementById("uploadArea").style.display = "none";
        document.getElementById("searchContainer").style.display = "flex";
        const v = document.getElementById("viewer");
        v.innerHTML = docHtml;
        v.style.display = "block";
        // [NOVO] Garante que mobileResults suma ao carregar/sincronizar
        const mr = document.getElementById("mobileResults");
        mr.style.display = "none";
        mr.innerHTML = "";
    }

    // Sincronização Inteligente (Detecta arquivo docx ou html)
    async function fetchLatestFromSupabase() {
        if (isProcessing) return;
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        try {
            const { data, error } = await _supabase.storage.from(BUCKET).list('', {
                limit: 1, 
                sortBy: { column: 'created_at', order: 'desc' }
            });

            if (error || !data || data.length === 0) return;

            const latestFile = data[0];
            const localFileName = localStorage.getItem("lastFileName");

            // Baixa se o arquivo do Supabase for diferente do localStorage (outro dispositivo subiu algo novo)
            // OU se ainda não sincronizou nessa sessão (garante que o F5 sempre busca o mais recente)
            const syncedThisSession = sessionStorage.getItem("syncedFile");
            const needsDownload = latestFile.name !== localFileName || (latestFile.name === localFileName && !syncedThisSession);

            if (latestFile && (latestFile.name.endsWith('.docx') || latestFile.name.endsWith('.html')) && needsDownload) {
                
                const { data: fileData, error: downloadError } = await _supabase.storage.from(BUCKET).download(latestFile.name);
                if (downloadError) throw downloadError;

                if (fileData) {
                    if (latestFile.name.endsWith('.docx')) {
                        const arrayBuffer = await fileData.arrayBuffer();
                        await processDoc(arrayBuffer);
                    } else if (latestFile.name.endsWith('.html')) {
                        const text = await fileData.text();
                        displayCachedHtml(text);
                        saveToDB(text); 
                    }
                    localStorage.setItem("lastFileName", latestFile.name);
                    // [CORREÇÃO F5] Marca que já sincronizou nessa sessão
                    sessionStorage.setItem("syncedFile", latestFile.name);
                }
            }
        } catch (err) {
            console.error("Erro ao buscar arquivo do Supabase:", err);
        }
    }

    // Faz o Upload da versão HTML atualizada para sincronizar as tabelas adicionadas
    async function uploadHtmlToSupabase(htmlContent) {
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const fileName = `doc_${Date.now()}.html`;
        const counter = document.getElementById("counterText");
        
        counter.innerText = "Salvando na nuvem...";

        try {
            const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
            await _supabase.storage.from(BUCKET).upload(fileName, blob);
            localStorage.setItem("lastFileName", fileName);
            // [CORREÇÃO F5] Atualiza também o sessionStorage ao fazer upload
            sessionStorage.setItem("syncedFile", fileName);
            
            counter.innerText = "Sincronizado!";
            setTimeout(() => { if(counter.innerText === "Sincronizado!") counter.innerText = "Pronto."; }, 3000);
        } catch(ex) {
            console.error("Erro no upload de atualização:", ex);
            counter.innerText = "Erro ao salvar na nuvem.";
        }
    }

    // Função Otimizada para Salvar (Não trava o mobile)
    function debounceSave() {
        clearTimeout(debounceTimer);
        // Espera 1.5 segundos após a pessoa parar de digitar para salvar (Acaba com os travamentos)
        debounceTimer = setTimeout(() => {
            const viewer = document.getElementById("viewer");
            
            // Remove marcações amarelas de busca antes de salvar para não bugar o arquivo oficial
            const clone = viewer.cloneNode(true);
            const matches = clone.querySelectorAll('.match');
            matches.forEach(el => {
                const parent = el.parentNode;
                while(el.firstChild) parent.insertBefore(el.firstChild, el);
                parent.removeChild(el);
            });
            
            docHtml = clone.innerHTML;
            saveToDB(docHtml); // Salva local
            uploadHtmlToSupabase(docHtml); // Envia a versão para a nuvem sincronizar todos os aparelhos
        }, 1500); 
    }

    // Upload Local e para Supabase do Documento Original
    const fileInput = document.getElementById("fileInput");
    document.getElementById("uploadArea").onclick = () => fileInput.click();

    fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const fileName = `doc_${Date.now()}.docx`;
        try {
            await _supabase.storage.from(BUCKET).upload(fileName, file);
            localStorage.setItem("lastFileName", fileName);
        } catch(ex) {
            console.error("Erro no upload:", ex);
        }

        const reader = new FileReader();
        reader.onload = ev => {
            processDoc(ev.target.result);
        };
        reader.readAsArrayBuffer(file);
    };

    // Adicionar Nova Tabela (Linha com Nome e Informação)
    function addNewRow() {
        const viewer = document.getElementById("viewer");
        if (!viewer || viewer.style.display === "none") {
            alert("Abra ou espere carregar uma lista primeiro.");
            return;
        }

        const newTable = document.createElement("table");
        newTable.style.width = "100%";
        newTable.style.marginTop = "15px";
        
        newTable.innerHTML = `
            <tr>
                <td style="width: 80%; border: 1px solid #333; padding: 8px; color: #fff;" contenteditable="true">Inserir Nome...</td>
                <td style="width: 20%; border: 1px solid #333; padding: 8px; color: #fff; text-align: center;" contenteditable="true">Info...</td>
            </tr>
        `;

        // Ativa a função inteligente que salva em background sem travar
        newTable.addEventListener("input", debounceSave);

        viewer.appendChild(newTable);
        
        // Dispara o salvamento para que a linha vazia recém-criada vá logo pra nuvem
        debounceSave();

        newTable.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    // Regex Fonético
    function generateSmartRegex(query) {
        let q = query.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\./g, "").toLowerCase().trim();
        q = q.replace(/(.)\1+/g, "$1").replace(/^h/, "");
        const mapa = {
            'a':'[aáàãâ]','e':'[iyeéê]','i':'[eiíy]','y':'[eyií]',
            'o':'[oóôõ]', 'u':'[uúüw]','w':'[vwuúü]',
            'c': '[cçcskq]', 'k':'[ckq]', 'q':'[qkc]',
            's':'[sçcz]', 'z':'[zsç]', 'ç':'[çscz]', 'v':'[vw]', 'g':'[gj]', 'j':'[jg]' 
        };
        const pattern = q.split("").map(c => (mapa[c] || c.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")) + "+").join("h?");
        return new RegExp(`(h?${pattern})`, "gi");
    }

    function performSearch() {
        if (isProcessing) return;
        const query = document.getElementById("searchInput").value;
        const viewer = document.getElementById("viewer");
        const mobileResults = document.getElementById("mobileResults");
        const nav = document.getElementById("navButtons");
        const badge = document.getElementById("personBadge");
        const counter = document.getElementById("counterText");

        if (!query.trim()) return;

        viewer.innerHTML = docHtml;
        matchesElements = []; currentIdx = -1;
        badge.style.display = "none";
        nav.style.display = "none";
        // [NOVO] Limpa o painel mobile a cada nova busca
        mobileResults.style.display = "none";
        mobileResults.innerHTML = "";

        const regex = generateSmartRegex(query);
        const walker = document.createTreeWalker(viewer, NodeFilter.SHOW_TEXT, null, false);
        const nodes = []; 
        let n;
        while (n = walker.nextNode()) nodes.push(n);

        nodes.forEach(node => {
            if (regex.test(node.nodeValue)) {
                const span = document.createElement("span");
                span.innerHTML = node.nodeValue.replace(regex, '<span class="match">$1</span>');
                node.parentNode.replaceChild(span, node);
            }
        });

        const allMatches = Array.from(viewer.querySelectorAll(".match"));
        const exactQuery = query.trim().toLowerCase();
        
        const exactMatches = [];
        const phoneticMatches = [];
        
        allMatches.forEach(el => {
            if (el.textContent.toLowerCase().includes(exactQuery)) {
                exactMatches.push(el);
            } else {
                phoneticMatches.push(el);
            }
        });

        matchesElements = [...exactMatches, ...phoneticMatches];
        
        // Reatribui a função de salvar para não perder as edições caso o usuário edite tabelas que já existem
        const editables = viewer.querySelectorAll('td[contenteditable="true"]');
        editables.forEach(td => td.addEventListener("input", debounceSave));
        
        if (matchesElements.length > 0) {
            nav.style.display = "flex";
            counter.innerText = `${matchesElements.length} itens encontrados.`;
            if (/^[A-ZÀ-Ú]/.test(query.trim())) {
                badge.style.display = "inline-block";
                document.getElementById("pName").innerText = query;
            }

            if (isMobile) {
                // [CORREÇÃO MOBILE] Oculta o documento inteiro e exibe só as linhas encontradas
                viewer.style.display = "none";
                mobileResults.style.display = "block";

                matchesElements.forEach((el, idx) => {
                    // Sobe até o <tr> e reconstrói uma <table> completa — igual ao estilo original
                    const tr = el.closest("tr");
                    const table = document.createElement("table");
                    table.dataset.idx = idx;
                    if (tr) {
                        const tbody = document.createElement("tbody");
                        tbody.appendChild(tr.cloneNode(true));
                        table.appendChild(tbody);
                    } else {
                        // Fallback para conteúdo fora de tabela
                        const row = el.closest("p") || el.closest("li") || el.parentElement;
                        const tr2 = document.createElement("tr");
                        const td = document.createElement("td");
                        td.innerHTML = row ? row.innerHTML : el.outerHTML;
                        tr2.appendChild(td);
                        table.appendChild(tr2);
                    }
                    mobileResults.appendChild(table);
                });

                currentIdx = -1;
                navigate(1);
            } else {
                navigate(1);
            }
        } else {
            counter.innerText = "Não encontrado.";
        }
    }

    function navigate(dir) {
        if (!matchesElements.length) return;
        const mobileResults = document.getElementById("mobileResults");

        if (isMobile && mobileResults.style.display === "block") {
            // [NOVO] Navegação nos cards mobile
            const prevCard = mobileResults.querySelector(".active-item");
            if (prevCard) prevCard.classList.remove("active-item");

            currentIdx += dir;
            if (currentIdx >= matchesElements.length) currentIdx = 0;
            if (currentIdx < 0) currentIdx = matchesElements.length - 1;

            const card = mobileResults.querySelector(`[data-idx="${currentIdx}"]`);
            if (card) {
                card.classList.add("active-item");
                card.scrollIntoView({ behavior: "smooth", block: "center" });
            }
        } else {
            if (currentIdx >= 0) matchesElements[currentIdx].classList.remove("active");
            currentIdx += dir;
            if (currentIdx >= matchesElements.length) currentIdx = 0;
            if (currentIdx < 0) currentIdx = matchesElements.length - 1;
            const el = matchesElements[currentIdx];
            el.classList.add("active");
            el.scrollIntoView({ behavior: "smooth", block: "center" });
        }

        document.getElementById("counterText").innerText = `${currentIdx + 1} de ${matchesElements.length}`;
    }

    // Voz (Timer 5 Segundos)
    const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (Speech) {
        const rec = new Speech();
        rec.lang = "pt-BR";
        let voiceTimeout;
        const vBtn = document.getElementById("voiceBtn");
        
        vBtn.onclick = () => { 
            try { rec.start(); } catch(e) {}
            vBtn.classList.add("recording"); 
            
            clearTimeout(voiceTimeout);
            voiceTimeout = setTimeout(() => {
                try { rec.stop(); } catch(e) {}
                vBtn.classList.remove("recording");
            }, 5000);
        };
        
        rec.onresult = e => {
            document.getElementById("searchInput").value = e.results[0][0].transcript.replace(/\.$/, "");
            performSearch();
        };
        
        rec.onend = () => {
            vBtn.classList.remove("recording");
            clearTimeout(voiceTimeout);
        };
    }

    // Carregamento Inicial
    window.onload = async () => {
        await initDB();
        const savedData = await loadFromDB();
        
        if (savedData) {
            if (typeof savedData === 'string') {
                displayCachedHtml(savedData);
            } else {
                processDoc(savedData);
            }
        } 
        
        if (!sessionStorage.getItem("skipSupabaseFetch")) {
            fetchLatestFromSupabase();
        }

        // Mantém os outros aparelhos sincronizados (Verifica a cada 10 segundos discretamente)
        setInterval(() => {
            fetchLatestFromSupabase();
        }, 10000);
    };

    document.getElementById("searchInput").onkeypress = e => { if (e.key === "Enter") performSearch(); };
</script>

</body>
</html>
